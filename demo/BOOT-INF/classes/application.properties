spring.application.name=demo
server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://mysql:3306/jwt_demo?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=myVeryLongAndSuperSecretKeyForJwtTokenGenerationThatIsAtLeast64CharactersLong1234567890AbCdEfGh
jwt.expiration=86400000

# Kafka ✅ use kafka:9092 not localhost!
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Kafka enabled
kafka.enabled=true

# Eureka
eureka.client.service-url.defaultZone=http://demo1:8081/eureka/
eureka.instance.prefer-ip-address=true