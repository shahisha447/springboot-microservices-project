spring.datasource.url=jdbc:mysql://localhost:3306/new_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ✅ FIXED — was kafka:9092, must be localhost:9092 for IntelliJ
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=demo1-group-v2
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.Map
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.properties.allow.auto.create.topics=true
# ✅ ADD THESE
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
# 600000ms = 10 minutes cache expiry


jwt.secret=mySecretKey12345678901234567890123456789012
jwt.expiration=86400000

kafka.enabled=true